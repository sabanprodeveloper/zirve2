<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çekiliş Sonuçları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="results-page">
        <div class="card results-card">
            <h1>📋 Çekiliş Sonuçları</h1>
            <div id="results-wrapper" class="results-list"></div>
            <div class="section">
                <button id="back-btn" class="btn btn-primary">Geri</button>
            </div>
        </div>
    </div>

    <div class="sponsors-card">
        <h2>🤝 Sponsorlarımız</h2>
        <div class="sponsors-container">
            <div class="sponsor-item">
                <img src="sponsorlar/bilinmeyen.jpg" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/gamezone.png" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/images.jfif" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/jamal.jpg" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/kılıcoglu.png" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/palaryum.png" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/plantso.jfif" alt="Sponsor" class="sponsor-logo">
            </div>
            <div class="sponsor-item">
                <img src="sponsorlar/telvedar.jpg" alt="Sponsor" class="sponsor-logo">
            </div>
        </div>
    </div>

    <script src="results.js"></script>
</body>
</html>
